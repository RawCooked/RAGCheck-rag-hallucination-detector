# RAGCheck configuration
# Central place for model names, paths, and pipeline parameters so nothing
# is hardcoded inside the source files. Override any of these with
# environment variables (see .env.example) where noted.

corpus:
  # HuggingFace dataset used to seed the demo RAG pipeline (Step 1 only).
  # rag-mini-wikipedia ships a small pre-chunked Wikipedia passage corpus
  # (~3.2k passages) plus a matching QA set, which is exactly what a demo
  # retriever needs and is small enough to embed on a laptop CPU.
  # It is NOT the benchmark dataset -- RAGTruth / HaluEval (loaded later,
  # in src/benchmark/) already ship their own (question, context, answer)
  # triples with hallucination labels, so they don't need our retriever.
  dataset_name: "rag-datasets/rag-mini-wikipedia"
  text_config: "text-corpus"
  qa_config: "question-answer"

chunking:
  # rag-mini-wikipedia passages are already short, but we still pass them
  # through the chunker so the pipeline works on arbitrary raw text later.
  chunk_size_words: 150
  chunk_overlap_words: 30

embedding:
  # Small, fast, CPU-friendly sentence embedding model with strong
  # retrieval performance for its size -- a standard default choice.
  model_name: "sentence-transformers/all-MiniLM-L6-v2"

vectorstore:
  provider: "chromadb"
  persist_dir: "data/chroma_db"
  collection_name: "ragcheck_corpus"

retrieval:
  top_k: 3

generation:
  # "local" runs a small instruction-tuned seq2seq model on-device, no API
  # key required. Swap to "openai" later once verification/ needs a
  # stronger generator -- the interface in src/rag/generator.py is written
  # so callers don't care which backend is behind it.
  backend: "local"
  local_model_name: "google/flan-t5-base"
  max_new_tokens: 200
  openai_model_name: "gpt-4o-mini"

verification:
  # NLI cross-encoder: scores a (premise, hypothesis) pair directly as
  # entailment/neutral/contradiction probabilities, rather than needing a
  # separate classification head -- the standard choice for this task.
  # ~184M params, runs on CPU in well under a second per claim.
  nli_model_name: "cross-encoder/nli-deberta-v3-base"
  # A claim is "supported" if any evidence chunk's entailment probability
  # clears this bar; "contradicted" if none entail but one's contradiction
  # probability clears contradiction_threshold; otherwise "neutral"
  # (no evidence either way). 0.5 is the natural default for a 3-way
  # softmax: a class only exceeds it if it's already the argmax.
  entailment_threshold: 0.5
  contradiction_threshold: 0.5
  # Embedding-similarity baseline: a claim is "supported" if its cosine
  # similarity to the closest evidence chunk clears this bar. Reuses the
  # same embedding model as retrieval (src/rag/embedding.py).
  embedding_similarity_threshold: 0.5

benchmark:
  # Row limit for src/benchmark/run_benchmark.py's default run, i.e. how
  # many HaluEval source rows to score (each yields 2 BenchmarkExamples:
  # one supported, one hallucinated). Kept small by default so a full
  # benchmark run finishes in a couple minutes on CPU; override with
  # --limit on the CLI for a larger/full run.
  sample_limit: 50

paths:
  data_dir: "data"
  raw_corpus_cache: "data/corpus_cache"
